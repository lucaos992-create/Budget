.savings-card {
  margin: 0 16px 20px;
  background: linear-gradient(135deg,#312080 0%,#6d28d9 50%,#7c3aed 100%);
  border-radius:22px; padding:22px 22px 18px;

}
.savings-card::before { content:''; position:absolute; top:-20px; right:-20px; width:100px; height:100px; background:rgba(255,255,255,0.07); border-radius:50%; }
.savings-card::after  { content:''; position:absolute; bottom:-30px; left:30px; width:70px; height:70px; background:rgba(255,255,255,0.04); border-radius:50%; }
.savings-label { font-size:11px; opacity:.7; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; font-weight:500; }
.savings-amount { font-size:44px; font-weight:700; letter-spacing:-1px; margin-bottom:2px; transition:color .4s; }

.progress-track { background:rgba(255,255,255,0.18); border-radius:100px; height:6px; margin-bottom:8px; }

<script>
const MONTHS = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

const CATS = [
  { id:"mutuo",        label:"Mutuo",             icon:"🏠", color:"#a78bfa", bg:"#2e1f5e", w:.12 },
  { id:"figli",        label:"Figli",              icon:"👨‍👧", color:"#fb923c", bg:"#431407", w:.13 },
  { id:"auto",         label:"Auto",               icon:"🚗", color:"#fbbf24", bg:"#3a2e10", w:.10 },
  { id:"trasporti",    label:"Trasporti",           icon:"🚌", color:"#67e8f9", bg:"#0a2a30", w:.05 },
  { id:"alimentari",   label:"Alimentari & Casa",  icon:"🛒", color:"#4ade80", bg:"#052e16", w:.13 },
  { id:"ristoranti",   label:"Ristoranti",          icon:"🍽️", color:"#f97316", bg:"#3a1505", w:.08 },
  { id:"abbonamenti",  label:"Abbonamenti",         icon:"📱", color:"#38bdf8", bg:"#0c2a3a", w:.05 },
  { id:"shopping",     label:"Shopping",            icon:"🛍️", color:"#f472b6", bg:"#3a0a2a", w:.08 },
  { id:"sigarette",    label:"Sigarette",           icon:"🚬", color:"#a3a3a3", bg:"#1e1e1e", w:.05 },
  { id:"svago",        label:"Svago",               icon:"🎭", color:"#e879f9", bg:"#2e1040", w:.08 },
  { id:"altro",        label:"Altro",               icon:"💳", color:"#94a3b8", bg:"#1e2330", w:.07 },
];

const TX_KEY  = "budget_txs_v2";
const CFG_KEY = "budget_cfg_v2";
let txs = [];
let cfg = { income: 0, target: 0, startDay: 1 };

function load() {
  try { txs = JSON.parse(localStorage.getItem(TX_KEY)) || []; } catch(_) { txs = []; }
  try { const c = JSON.parse(localStorage.getItem(CFG_KEY)); if(c) cfg = {...cfg, ...c}; } catch(_) {}
}
function save() {
  try { localStorage.setItem(TX_KEY, JSON.stringify(txs)); } catch(_) {}
  try { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); } catch(_) {}
}

function fmtEur(n) { return "€" + Math.abs(Math.round(n)).toLocaleString("it-IT"); }
function fmtDate(ts) { const d = new Date(ts); return `${d.getDate()}/${d.getMonth()+1}`; }

// Calcola la "chiave periodo" basata sul giorno di inizio mese personalizzato
function getPeriodKey(dateObj, startDay) {
  const d = dateObj || new Date();
  const day = d.getDate();
  // Se siamo prima del giorno di inizio, apparteniamo al periodo del mese precedente
  if (day < startDay) {
    const prev = new Date(d.getFullYear(), d.getMonth() - 1, 1);
    return `${prev.getFullYear()}-${prev.getMonth()}`;
  }
  return `${d.getFullYear()}-${d.getMonth()}`;
}

// Etichetta leggibile del periodo corrente
function getPeriodLabel(startDay) {
  const now = new Date();
  const day = now.getDate();
  let startDate, endDate;
  if (day >= startDay) {
    startDate = new Date(now.getFullYear(), now.getMonth(), startDay);
    endDate   = new Date(now.getFullYear(), now.getMonth() + 1, startDay - 1);
  } else {
    startDate = new Date(now.getFullYear(), now.getMonth() - 1, startDay);
    endDate   = new Date(now.getFullYear(), now.getMonth(), startDay - 1);
  }
  const fmt = d => `${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}`;
  return `${fmt(startDate)} – ${fmt(endDate)} ${endDate.getFullYear()}`;
}

// Giorni rimanenti nel periodo corrente
function getDaysLeft(startDay) {
  const now = new Date();
  const day = now.getDate();
  let endDate;
  if (day >= startDay) {
    endDate = new Date(now.getFullYear(), now.getMonth() + 1, startDay - 1);
  } else {
    endDate = new Date(now.getFullYear(), now.getMonth(), startDay - 1);
  }
  const diff = endDate - new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.max(0, Math.round(diff / 86400000));
}

function render() {
  const startDay = cfg.startDay || 1;
  const periodKey = getPeriodKey(new Date(), startDay);

  document.getElementById("month-label").textContent = getPeriodLabel(startDay);

  const mt = txs.filter(t => t.period === periodKey);
  const spent = mt.reduce((s,t) => s + t.amount, 0);
  const income = cfg.income || 0;
  const target = cfg.target || 0;
  const sav = Math.max(0, income - spent);
  const pct = target > 0 ? Math.min(100, (sav / target) * 100) : 0;
  const col = pct >= 100 ? "#4ade80" : pct >= 60 ? "#fbbf24" : "#f87171";

  document.getElementById("savings-amount").textContent = fmtEur(sav);
  document.getElementById("savings-amount").style.color = col;

  if (target > 0) {
    document.getElementById("savings-sub").textContent = `target ${fmtEur(target)} · ${Math.round(pct)}% raggiunto`;
  } else {
    document.getElementById("savings-sub").textContent = "Imposta stipendio e target nelle ⚙️ impostazioni";
  }

  // Spesa giornaliera massima
  const dailyEl = document.getElementById("daily-budget");
  if (income > 0 && target > 0) {
    const daysLeft = getDaysLeft(startDay);
    const budgetLeft = (income - target) - spent;
    if (daysLeft > 0) {
      const daily = Math.max(0, budgetLeft / daysLeft);
      dailyEl.textContent = `📅 Max ${fmtEur(daily)}/giorno · ${daysLeft} giorni rimanenti`;
    } else {
      dailyEl.textContent = "📅 Ultimo giorno del periodo!";
    }
    dailyEl.style.display = "inline-block";
  } else {
    dailyEl.style.display = "none";
  }

  const bar = document.getElementById("savings-bar");
  bar.style.width = pct + "%"; bar.style.background = col;
  document.getElementById("spent-label").textContent = "Speso: " + fmtEur(spent);
  document.getElementById("income-label").textContent = "Netto: " + (income > 0 ? fmtEur(income) : "—");

  const spendable = Math.max(0, income - target);
  const cs = {};
  CATS.forEach(c => cs[c.id] = 0);
  mt.forEach(t => { if (cs[t.cat] !== undefined) cs[t.cat] += t.amount; });

  document.getElementById("cat-list").innerHTML = CATS.map(c => {
    const s = cs[c.id] || 0;
    const bgt = spendable > 0 ? Math.round(spendable * c.w) : 0;
    const p = bgt > 0 ? Math.min(100,(s/bgt)*100) : 0;
    const bc = p>=100?"#f87171":p>=80?"#fbbf24":c.color;
    return `<div class="cat-card">
      <div class="cat-row">
        <div class="cat-left">
          <div class="cat-icon" style="background:${c.bg}">${c.icon}</div>
          <div>
            <div class="cat-name">${c.label}</div>
            <div class="cat-budget-lbl">Budget: ${bgt > 0 ? fmtEur(bgt) : "—"}</div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="cat-amount" style="color:${bc}">${fmtEur(s)}</div>
          <div class="cat-pct">${bgt > 0 ? Math.round(p)+"%" : ""}</div>
        </div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${bc}"></div></div>
    </div>`;
  }).join("");

  const sorted = [...mt].sort((a,b) => b.ts - a.ts);
  document.getElementById("tx-list").innerHTML = sorted.length === 0
    ? `<div class="tx-empty"><div class="tx-empty-icon">🧾</div>Nessun movimento questo periodo.<br/>Aggiungi la prima spesa!</div>`
    : sorted.map(t => {
        const cat = CATS.find(c => c.id === t.cat) || CATS[CATS.length-1];
        return `<div class="tx-card">
          <div class="tx-icon" style="background:${cat.bg}">${cat.icon}</div>
          <div style="flex:1;min-width:0">
            <div class="tx-desc">${t.desc}</div>
            <div class="tx-meta">${cat.label} · ${fmtDate(t.ts)}</div>
          </div>
          <div class="tx-amount">-${fmtEur(t.amount)}</div>
          <button class="tx-del" onclick="delTx('${t.id}')">✕</button>
        </div>`;
      }).join("");
}

function switchTab(tab) {
  document.getElementById("cat-list").style.display = tab==="cats" ? "flex" : "none";
  document.getElementById("tx-list").style.display  = tab==="txs"  ? "flex" : "none";
  document.getElementById("tab-cats").classList.toggle("active", tab==="cats");
  document.getElementById("tab-txs").classList.toggle("active",  tab==="txs");
}

function openModal(id) { document.getElementById("modal-"+id).classList.add("open"); }
function closeModal(id) { document.getElementById("modal-"+id).classList.remove("open"); }
function overlayClick(e, id) { if (e.target===e.currentTarget) closeModal(id); }

function openSettings() {
  document.getElementById("s-income").value = cfg.income || "";
  document.getElementById("s-target").value = cfg.target || "";
  document.getElementById("s-startday").value = cfg.startDay || 1;
  openModal("settings");
}

function saveSettings() {
  const inc = parseFloat(document.getElementById("s-income").value);
  const tgt = parseFloat(document.getElementById("s-target").value);
  const sd  = parseInt(document.getElementById("s-startday").value);
  if (inc > 0) cfg.income = inc;
  if (tgt > 0) cfg.target = tgt;
  if (sd >= 1 && sd <= 28) cfg.startDay = sd;
  save(); render();
  closeModal("settings");
}

function addTx() {
  const desc = document.getElementById("f-desc").value.trim();
  const amt  = parseFloat(document.getElementById("f-amount").value);
  document.getElementById("f-desc").classList.toggle("error", !desc);
  document.getElementById("f-amount").classList.toggle("error", !amt||amt<=0);
  if (!desc||!amt||amt<=0) return;
  const periodKey = getPeriodKey(new Date(), cfg.startDay || 1);
  txs.push({ id:Date.now().toString(), desc, amount:amt, cat:document.getElementById("f-cat").value, period:periodKey, ts:Date.now() });
  save(); render();
  document.getElementById("f-desc").value = "";
  document.getElementById("f-amount").value = "";
  closeModal("expense");
}

function delTx(id) { txs = txs.filter(t => t.id !== id); save(); render(); }

// Popola select categorie
const sel = document.getElementById("f-cat");
CATS.forEach(c => { const o = document.createElement("option"); o.value=c.id; o.textContent=c.icon+" "+c.label; sel.appendChild(o); });
sel.value = "alimentari";

// Popola select giorno inizio (1-28)
const dsel = document.getElementById("s-startday");
for (let i = 1; i <= 28; i++) {
  const o = document.createElement("option");
  o.value = i; o.textContent = i === 1 ? `1 (inizio mese solare)` : `${i}`;
  dsel.appendChild(o);
}

load(); render();
</script>
